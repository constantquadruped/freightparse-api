openapi: 3.0.3
info:
  title: FreightParse API
  description: |
    Turn messy shipping documents into clean, structured JSON.

    **Supported documents:**
    - Bills of Lading (BOL) — extract shipper, consignee, containers, ports, weights
    - Freight Invoices — extract charges, line items, references, payment terms
    - Packing Lists — extract items, quantities, weights, HS codes, dimensions

    **How it works:** Paste raw text or OCR output from your freight documents.
    The API returns structured JSON with typed fields, confidence scores, and warnings.

    **New in v2:** Batch endpoint for parsing up to 10 documents in one call.
    Request tracing via X-Request-ID header. Improved reliability with retries.

    **Accuracy:** Powered by Claude AI with freight-specific parsing prompts.
    Handles major carriers (Maersk, MSC, CMA CGM, Hapag-Lloyd, etc.) and
    standard freight document formats.
  version: 2.0.1
  contact:
    name: FreightParse Support

servers:
  - url: https://freightparse-api.onrender.com

paths:
  /parse-bol:
    post:
      operationId: parseBOL
      summary: Parse Bill of Lading
      description: Extract structured data from a Bill of Lading document.
      tags: [Parsing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 20
                  maxLength: 50000
                  description: Raw BOL text or OCR output
                carrier_hint:
                  type: string
                  description: "Carrier name for better parsing (e.g. 'Maersk', 'MSC')"
            example:
              text: "BILL OF LADING\nB/L No: MEDU4712839\nSHIPPER: Guangzhou Sunrise Electronics..."
              carrier_hint: "MSC"
      responses:
        "200":
          description: Parsed BOL data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BOLResponse"
        "401":
          description: Invalid API key
        "422":
          description: Validation error
        "429":
          description: Rate limit exceeded
        "502":
          description: AI parsing failure
        "504":
          description: AI service timeout

  /parse-freight-invoice:
    post:
      operationId: parseFreightInvoice
      summary: Parse Freight Invoice
      description: Extract structured data from a freight/shipping invoice.
      tags: [Parsing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 20
                  maxLength: 50000
                  description: Raw freight invoice text or OCR output
                carrier_hint:
                  type: string
                  description: "Carrier or vendor name hint"
            example:
              text: "FREIGHT INVOICE\nINVOICE NO: APX-2026-00847\nOcean Freight: $4,200.00..."
      responses:
        "200":
          description: Parsed invoice data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreightInvoiceResponse"
        "401":
          description: Invalid API key
        "422":
          description: Validation error
        "429":
          description: Rate limit exceeded
        "502":
          description: AI parsing failure

  /parse-packing-list:
    post:
      operationId: parsePackingList
      summary: Parse Packing List
      description: Extract structured data from a packing list document.
      tags: [Parsing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 20
                  maxLength: 50000
                  description: Raw packing list text or OCR output
                carrier_hint:
                  type: string
                  description: "Shipper or context hint"
            example:
              text: "PACKING LIST\nPL No: PL-GZ-2026-0471\nItem: 27\" LED Monitor..."
      responses:
        "200":
          description: Parsed packing list data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackingListResponse"
        "401":
          description: Invalid API key
        "422":
          description: Validation error
        "429":
          description: Rate limit exceeded
        "502":
          description: AI parsing failure

  /parse-batch:
    post:
      operationId: parseBatch
      summary: Parse Multiple Documents
      description: |
        Parse up to 10 documents in a single API call. Each document is processed
        independently — failures on one document don't affect others.
        Results include per-document success/failure status.
      tags: [Batch]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRequest"
            example:
              documents:
                - doc_type: bol
                  text: "BILL OF LADING\nB/L No: MEDU4712839..."
                  carrier_hint: "MSC"
                - doc_type: freight_invoice
                  text: "FREIGHT INVOICE\nINVOICE NO: APX-2026-00847..."
      responses:
        "200":
          description: Batch parsing results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        "401":
          description: Invalid API key
        "422":
          description: Validation error
        "429":
          description: Rate limit exceeded

  /parse-bol/upload:
    post:
      operationId: parseBOLUpload
      summary: Parse Bill of Lading Upload
      description: Extract structured data from an uploaded Bill of Lading file.
      tags: [Uploads]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF, image, or text file
                carrier_hint:
                  type: string
                  description: "Carrier name for better parsing (e.g. 'Maersk', 'MSC')"
      responses:
        "200":
          description: Parsed BOL data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BOLResponse"
        "400":
          description: Unsupported or unreadable file
        "401":
          description: Invalid API key
        "422":
          description: Validation error
        "429":
          description: Rate limit exceeded
        "502":
          description: AI parsing failure
        "504":
          description: AI service timeout

  /parse-freight-invoice/upload:
    post:
      operationId: parseFreightInvoiceUpload
      summary: Parse Freight Invoice Upload
      description: Extract structured data from an uploaded freight invoice file.
      tags: [Uploads]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF, image, or text file
                carrier_hint:
                  type: string
                  description: "Carrier or vendor name hint"
      responses:
        "200":
          description: Parsed invoice data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreightInvoiceResponse"
        "400":
          description: Unsupported or unreadable file
        "401":
          description: Invalid API key
        "422":
          description: Validation error
        "429":
          description: Rate limit exceeded
        "502":
          description: AI parsing failure
        "504":
          description: AI service timeout

  /parse-packing-list/upload:
    post:
      operationId: parsePackingListUpload
      summary: Parse Packing List Upload
      description: Extract structured data from an uploaded packing list file.
      tags: [Uploads]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF, image, or text file
                carrier_hint:
                  type: string
                  description: "Shipper or context hint"
      responses:
        "200":
          description: Parsed packing list data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackingListResponse"
        "400":
          description: Unsupported or unreadable file
        "401":
          description: Invalid API key
        "422":
          description: Validation error
        "429":
          description: Rate limit exceeded
        "502":
          description: AI parsing failure
        "504":
          description: AI service timeout

components:
  schemas:
    Party:
      type: object
      properties:
        name: { type: string, nullable: true }
        address: { type: string, nullable: true }
        contact: { type: string, nullable: true }

    Container:
      type: object
      properties:
        number: { type: string, nullable: true }
        size: { type: string, nullable: true }
        type: { type: string, nullable: true }
        seal_number: { type: string, nullable: true }
        weight_kg: { type: number, nullable: true }

    BOLResponse:
      type: object
      properties:
        bol_number: { type: string, nullable: true }
        booking_number: { type: string, nullable: true }
        shipper: { $ref: "#/components/schemas/Party" }
        consignee: { $ref: "#/components/schemas/Party" }
        notify_party: { $ref: "#/components/schemas/Party" }
        carrier: { type: string, nullable: true }
        vessel_name: { type: string, nullable: true }
        voyage_number: { type: string, nullable: true }
        port_of_loading: { type: string, nullable: true }
        port_of_discharge: { type: string, nullable: true }
        place_of_delivery: { type: string, nullable: true }
        date_of_issue: { type: string, nullable: true }
        shipped_on_board_date: { type: string, nullable: true }
        containers:
          type: array
          items: { $ref: "#/components/schemas/Container" }
        commodity_description: { type: string, nullable: true }
        gross_weight_kg: { type: number, nullable: true }
        number_of_packages: { type: integer, nullable: true }
        package_type: { type: string, nullable: true }
        freight_terms: { type: string, nullable: true }
        hs_codes:
          type: array
          items: { type: string }
        confidence: { type: number }
        warnings:
          type: array
          items: { type: string }
        request_id: { type: string, nullable: true }

    InvoiceLineItem:
      type: object
      properties:
        description: { type: string }
        charge_type: { type: string, nullable: true }
        amount: { type: number, nullable: true }
        currency: { type: string, nullable: true }
        reference: { type: string, nullable: true }

    FreightInvoiceResponse:
      type: object
      properties:
        invoice_number: { type: string, nullable: true }
        invoice_date: { type: string, nullable: true }
        due_date: { type: string, nullable: true }
        vendor_name: { type: string, nullable: true }
        vendor_address: { type: string, nullable: true }
        bill_to_name: { type: string, nullable: true }
        bill_to_address: { type: string, nullable: true }
        bol_references:
          type: array
          items: { type: string }
        container_references:
          type: array
          items: { type: string }
        po_references:
          type: array
          items: { type: string }
        line_items:
          type: array
          items: { $ref: "#/components/schemas/InvoiceLineItem" }
        subtotal: { type: number, nullable: true }
        tax: { type: number, nullable: true }
        total: { type: number, nullable: true }
        currency: { type: string, nullable: true }
        payment_terms: { type: string, nullable: true }
        charge_breakdown: { type: object, nullable: true }
        confidence: { type: number }
        warnings:
          type: array
          items: { type: string }
        request_id: { type: string, nullable: true }

    PackingListItem:
      type: object
      properties:
        item_number: { type: string, nullable: true }
        description: { type: string }
        quantity: { type: number, nullable: true }
        unit: { type: string, nullable: true }
        net_weight_kg: { type: number, nullable: true }
        gross_weight_kg: { type: number, nullable: true }
        dimensions: { type: string, nullable: true }
        hs_code: { type: string, nullable: true }
        country_of_origin: { type: string, nullable: true }
        carton_numbers: { type: string, nullable: true }

    PackingListResponse:
      type: object
      properties:
        packing_list_number: { type: string, nullable: true }
        date: { type: string, nullable: true }
        shipper: { type: string, nullable: true }
        consignee: { type: string, nullable: true }
        po_references:
          type: array
          items: { type: string }
        invoice_references:
          type: array
          items: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/PackingListItem" }
        total_packages: { type: integer, nullable: true }
        total_gross_weight_kg: { type: number, nullable: true }
        total_net_weight_kg: { type: number, nullable: true }
        total_volume_cbm: { type: number, nullable: true }
        confidence: { type: number }
        warnings:
          type: array
          items: { type: string }
        request_id: { type: string, nullable: true }

    BatchDocumentRequest:
      type: object
      required: [doc_type, text]
      properties:
        doc_type:
          type: string
          enum: [bol, freight_invoice, packing_list]
          description: "Document type to parse"
        text:
          type: string
          minLength: 20
          maxLength: 50000
          description: "Raw document text or OCR output"
        carrier_hint:
          type: string
          description: "Carrier or context hint"

    BatchRequest:
      type: object
      required: [documents]
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/BatchDocumentRequest"
          minItems: 1
          maxItems: 10
          description: "Up to 10 documents per batch"

    BatchResultItem:
      type: object
      properties:
        index: { type: integer }
        doc_type: { type: string }
        success: { type: boolean }
        data: { type: object, nullable: true }
        error: { type: string, nullable: true }

    BatchResponse:
      type: object
      properties:
        results:
          type: array
          items: { $ref: "#/components/schemas/BatchResultItem" }
        total: { type: integer }
        succeeded: { type: integer }
        failed: { type: integer }
        request_id: { type: string, nullable: true }

  securitySchemes:
    RapidAPIKey:
      type: apiKey
      in: header
      name: X-RapidAPI-Key

security:
  - RapidAPIKey: []
